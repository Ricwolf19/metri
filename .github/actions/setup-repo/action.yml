name: 'Setup Repo'
description: 'Setup Node + Bun, cache the Bun store, and install dependencies. Assumes the repository is already checked out.'

inputs:
  cache:
    description: 'Enable Bun store caching'
    required: false
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: Cache Bun store
      if: ${{ inputs.cache == 'true' }}
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
